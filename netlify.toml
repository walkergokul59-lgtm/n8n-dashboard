[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Reference environment variables from Netlify UI
# These must be set in: Site settings → Build & deploy → Environment
[build.environment]
  APP_AUTH_SECRET = "$APP_AUTH_SECRET"
  GMAIL_APP_PASSWORD = "$GMAIL_APP_PASSWORD"
  GMAIL_USER = "$GMAIL_USER"
  GOOGLE_CLIENT_ID = "$GOOGLE_CLIENT_ID"
  N8N_API_BASE_PATH = "$N8N_API_BASE_PATH"
  N8N_API_TOKEN = "$N8N_API_TOKEN"
  N8N_AUTH_TYPE = "$N8N_AUTH_TYPE"
  N8N_BASE_URL = "$N8N_BASE_URL"
  PORT = "$PORT"
  VITE_GOOGLE_CLIENT_ID = "$VITE_GOOGLE_CLIENT_ID"

# Large vars also set in Netlify UI (bypass 4KB Lambda limit):
# - GOOGLE_SERVICE_ACCOUNT_JSON
# - GOOGLE_SHEETS_SPREADSHEET_ID

[functions]
  node_bundler = "esbuild"
  included_files = ["server/**", "api/**"]

# Proxy all /api/* requests to the single serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — let React Router handle client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
