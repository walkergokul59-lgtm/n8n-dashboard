[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Reference environment variables from Netlify UI
# These must be set in: Site settings → Build & deploy → Environment
[build.environment]
  VITE_GOOGLE_CLIENT_ID = "$VITE_GOOGLE_CLIENT_ID"

# Large vars also set in Netlify UI (bypass 4KB Lambda limit):
# - GOOGLE_SERVICE_ACCOUNT_JSON
# - GOOGLE_SHEETS_SPREADSHEET_ID

[functions]
  node_bundler = "esbuild"
  included_files = ["server/**", "api/**"]

# Proxy all /api/* requests to the single serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — let React Router handle client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
