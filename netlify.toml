[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["server/**", "api/**"]

# Proxy all /api/* requests to the single serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — let React Router handle client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
